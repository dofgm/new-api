<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 左侧青蓝渐变 -->
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c5bf5"/>
    </linearGradient>
    <!-- 右侧粉紫渐变 -->
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c471ed"/>
      <stop offset="100%" stop-color="#ff3d8b"/>
    </linearGradient>
    <!-- 星星渐变 -->
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="250" fill="url(#left)"/>

  <!-- 右半阴阳曲线 - 粉紫色 -->
  <path d="M256,6 A250,250 0 0,1 256,506 A125,125 0 0,0 256,256 A125,125 0 0,1 256,6Z" fill="url(#right)"/>

  <!-- 上方小圆（粉紫区域内的青蓝点） -->
  <circle cx="256" cy="131" r="42" fill="url(#left)"/>

  <!-- 下方小圆（青蓝区域内的粉紫点） -->
  <circle cx="256" cy="381" r="42" fill="url(#right)"/>

  <!-- 中央四角星 ✦ -->
  <path d="M256,210 L266,246 L302,256 L266,266 L256,302 L246,266 L210,256 L246,246 Z" fill="url(#star)" opacity="0.95"/>
</svg>

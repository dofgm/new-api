<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Style 4: A字母变形为箭头/三角 + IO -->
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="22" fill="url(#g4)"/>
  <!-- A as a geometric triangle -->
  <polygon points="32,82 48,38 64,82" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <line x1="38" y1="66" x2="58" y2="66" stroke="white" stroke-width="3.5"/>
  <!-- I -->
  <line x1="76" y1="40" x2="76" y2="82" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- O as circle -->
  <circle cx="96" cy="61" r="18" fill="none" stroke="white" stroke-width="4.5"/>
</svg>
